<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#1a1714" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pyxis" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Pyxis</title>
    <script>
      // Prevent theme flash: apply saved theme CSS vars before React renders
      (() => {
        try {
          var t = localStorage.getItem('pyxis-theme');
          if (!t || t === 'magenta') return;
          var themes = {
            olive: { bg: '#171a14', panel: '#121410' },
            amber: { bg: '#1a1610', panel: '#14120e' },
            ice: { bg: '#14171a', panel: '#101214' },
            carbon: { bg: '#141414', panel: '#0e0e0e' },
          };
          var c = themes[t];
          if (c) {
            document.documentElement.style.setProperty('--color-bg', c.bg);
            document.documentElement.style.setProperty('--color-bg-panel', c.panel);
            document.querySelector('meta[name="theme-color"]').setAttribute('content', c.bg);
          }
        } catch(_e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/web/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
